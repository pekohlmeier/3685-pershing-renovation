<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3685 Pershing Ave · Renovation Journal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;700&family=IM+Fell+English+SC&display=swap');

/* ── TABS ───────────────────────────────────────────── */
.tab-bar {
  display: flex; gap: 0;
  margin: 0 0 24px;
  border-bottom: 2px solid #827A60;
}
.tab {
  flex: 1;
  background: rgba(237,232,220,0.5);
  border: 1px solid #B5AB8A;
  border-bottom: none;
  padding: 14px 22px 12px;
  cursor: pointer;
  text-align: left;
  font-family: 'Playfair Display', serif;
  color: #5C4A38;
  position: relative;
  transition: all 0.15s ease;
  display: flex; align-items: baseline; gap: 12px;
  border-radius: 4px 4px 0 0;
  margin-right: -1px;
}
.tab:hover { background: #E8DFC4; color: #2A1F15; }
.tab.active {
  background: #DDD3BC;
  color: #1E3A52;
  border-color: #827A60;
  border-width: 1.5px;
  box-shadow: 0 -2px 0 #9C7A52 inset;
  z-index: 2;
}
.tab.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -2px;
  height: 2px;
  background: #DDD3BC;
}
.tab-num {
  font-family: 'IM Fell English SC', serif;
  font-size: 13px; letter-spacing: 2px;
  color: #9C7A52;
  font-weight: 700;
}
.tab-label {
  font-size: 19px; font-weight: 700;
  letter-spacing: -0.2px;
}
.tab-sub {
  font-style: italic;
  font-size: 13px;
  color: #827A60;
  margin-left: auto;
}

/* ── GLANCE VIEW ────────────────────────────────────── */
.glance {
  background: #DDD3BC;
  border: 1px solid #B5AB8A;
  padding: 24px;
  margin-bottom: 36px;
  box-shadow: 2px 3px 0 rgba(196,168,130,0.4);
}
.glance-stats {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 2px double #827A60;
}
.gstat {
  background: #EBE4D2;
  border: 1px solid #B5AB8A;
  padding: 12px 14px;
  text-align: center;
}
.gstat-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 2px;
  color: #827A60;
  margin-bottom: 4px;
  white-space: nowrap;
}
.gstat-value {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 700;
  color: #1E3A52;
  line-height: 1;
}
.gstat.alert { background: #D9CFB0; border-color: #8B5A1F; }
.gstat.alert .gstat-value { color: #8B2020; }
.gstat.done { background: #E5EBDC; border-color: #9CAA88; }
.gstat.done .gstat-value { color: #1E3A52; }
.gstat.hold { opacity: 0.6; }
.gstat.money .gstat-value { color: #9C7A52; font-size: 24px; padding-top: 6px; }

.glance-group { margin-bottom: 28px; }
.glance-group:last-child { margin-bottom: 0; }

.glance-group-head {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 8px;
  margin-bottom: 6px;
  border-bottom: 1.5px solid #827A60;
}
.glance-dot {
  width: 14px; height: 14px;
  border: 2px solid #5C4A38;
}
.glance-dot.tone-amber { background: #B89860; border-color: #8B5A1F; }
.glance-dot.tone-terra { background: #9C7A52; border-color: #5E4528; }
.glance-dot.tone-slate { background: #2F5468; border-color: #1E3A52; border-style: dashed; background: transparent; }
.glance-dot.tone-green { background: #1E3A52; border-color: #13283A; }
.glance-dot.tone-red   { background: #8B2020; border-color: #5A1212; }

.glance-group-title {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: #2A1F15;
  letter-spacing: -0.2px;
}
.glance-group-count {
  margin-left: auto;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  background: #5C4A38; color: #EBE4D2;
  padding: 3px 10px;
  border-radius: 999px;
  letter-spacing: 1px;
}

.glance-table {
  display: flex; flex-direction: column;
}
.glance-row {
  display: grid;
  grid-template-columns: 2.4fr 1.1fr 1.4fr 1.4fr 0.9fr 1fr;
  gap: 12px;
  padding: 10px 8px;
  align-items: baseline;
  border-bottom: 1px dashed #B5AB8A;
  font-family: 'Source Serif 4', serif;
  font-size: 14px;
  color: #2A1F15;
}
.glance-row:last-child { border-bottom: none; }
.glance-row.glance-head-row {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px;
  letter-spacing: 2.5px;
  color: #827A60;
  border-bottom: 1px solid #827A60;
  padding: 8px;
}
.glance-row .right { text-align: right; }
.glance-name {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 15px;
  color: #1E3A52;
  line-height: 1.25;
}
.glance-phone {
  font-family: 'Inter', sans-serif;
  font-size: 11.5px;
  color: #8B2020;
  font-weight: 500;
}
.glance-area {
  font-style: italic;
  font-size: 13px;
  color: #5C4A38;
}
.glance-contractor {
  font-size: 13.5px;
  color: #3A2E1E;
}
.diy-mini {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 2px;
  background: #1E3A52; color: #EBE4D2;
  padding: 2px 8px;
}
.glance-time { font-size: 13px; color: #5C4A38; }
.glance-money {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-feature-settings: "tnum" 1, "lnum" 1;
  color: #2A1F15;
  font-weight: 500;
}
.glance-pct {
  color: #827A60;
  font-size: 11.5px;
  margin-left: 2px;
}
.paid-full {
  color: #1E3A52;
  font-weight: 700;
}

/* Tone tints on group container */
.glance-group.tone-amber .glance-group-title { color: #8B5A1F; }
.glance-group.tone-terra .glance-group-title { color: #5E4528; }
.glance-group.tone-green .glance-group-title { color: #1E3A52; }
.glance-group.tone-red   .glance-group-title { color: #8B2020; }
.glance-group.tone-red   .glance-row { opacity: 0.65; }

@media (max-width: 900px) {
  .glance-stats { grid-template-columns: repeat(2, 1fr); }
  .glance-row { grid-template-columns: 1fr; gap: 4px; padding: 12px 6px; }
  .glance-row.glance-head-row { display: none; }
  .glance-row .right { text-align: left; }
  .glance-row > div::before {
    content: attr(data-l);
    display: block;
    font-family: 'IM Fell English SC', serif;
    font-size: 9px; letter-spacing: 2px;
    color: #827A60;
  }
  .tab-bar { flex-direction: column; gap: 4px; border-bottom: none; }
  .tab { border-radius: 4px; }
  .tab-sub { display: none; }
}

/* ── BASE ───────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Source Serif 4', 'Georgia', serif;
  color: #2A1F15;
  background: #EBE4D2;
  /* linen / paper noise */
  background-image:
    radial-gradient(circle at 20% 30%, rgba(196,168,130,0.06) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(196,98,58,0.04) 0, transparent 40%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.36  0 0 0 0 0.28  0 0 0 0 0.18  0 0 0 0.07 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  line-height: 1.55;
  font-size: 16px;
  min-height: 100vh;
}

#root { max-width: 1240px; margin: 0 auto; padding: 36px 28px 80px; }

.num { font-family: 'Inter', sans-serif; font-feature-settings: "tnum" 1, "lnum" 1; }

/* ── MASTHEAD ───────────────────────────────────────── */
.masthead { padding-bottom: 18px; border-bottom: 1px solid #B5AB8A; margin-bottom: 26px; }
.masthead-top {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; flex-wrap: wrap;
}
.eyebrow {
  font-family: 'IM Fell English SC', 'Playfair Display', serif;
  font-size: 12px; letter-spacing: 4px; color: #827A60;
  margin-bottom: 4px;
}
.address {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: clamp(40px, 6vw, 76px);
  line-height: 0.96;
  margin: 0;
  color: #1E3A52;
  letter-spacing: -1px;
}
.subaddress {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 17px;
  color: #5C4A38;
  margin-top: 6px;
  letter-spacing: 0.5px;
}
.masthead-right {
  display: flex; align-items: flex-end; gap: 18px;
}
.date-stamp {
  border: 1px dashed #827A60;
  padding: 8px 14px;
  background: rgba(237,232,220,0.6);
  text-align: right;
}
.date-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 3px; color: #827A60;
}
.date-value {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: #1E3A52; font-weight: 600;
}
.print-seal {
  background: none; border: none; cursor: pointer; padding: 0;
  filter: drop-shadow(2px 3px 1px rgba(92,61,46,0.25));
  transition: transform 0.15s;
}
.print-seal:hover { transform: rotate(-6deg) scale(1.05); }

.ornament-row { display: flex; justify-content: center; margin: 18px 0 14px; }

.pulse-line {
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px;
  font-family: 'Source Serif 4', serif;
  font-size: 15px; color: #2A1F15;
  justify-content: center;
}
.pulse-line b { font-weight: 700; color: #1E3A52; font-size: 16px; }
.dot-sep { color: #827A60; padding: 0 2px; }

/* ── ALERT NOTICE ───────────────────────────────────── */
.alert-notice {
  position: relative;
  display: flex; align-items: center; gap: 18px;
  background: linear-gradient(180deg, #D9CFB0, #C5B98F);
  border: 1.5px solid #8B5A1F;
  border-left: 8px solid #8B2020;
  padding: 16px 22px 16px 18px;
  margin-bottom: 32px;
  font-family: 'Source Serif 4', serif;
  box-shadow: 2px 3px 0 rgba(92,61,46,0.18);
}
.alert-notice::before {
  content: ""; position: absolute; inset: 4px;
  border: 1px dashed rgba(139,32,32,0.35);
  pointer-events: none;
}
.notice-stamp { flex: 0 0 auto; }
.notice-body { flex: 1; }
.notice-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 11px; letter-spacing: 4px; color: #8B2020;
  margin-bottom: 4px;
}
.notice-text { color: #3A1010; font-size: 15px; line-height: 1.5; }
.phone-num {
  font-family: 'Inter', sans-serif; font-weight: 600;
  background: #8B2020; color: #EBE4D2; padding: 1px 6px;
  letter-spacing: 0.5px;
}
.telegram-stripe {
  position: absolute; left: 0; right: 0; bottom: -6px; height: 6px;
  background: repeating-linear-gradient(45deg, #8B2020 0 8px, #EBE4D2 8px 16px);
  opacity: 0.5;
}

/* ── SECTION CHROME ─────────────────────────────────── */
.section-head {
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700; font-size: 28px; color: #1E3A52;
  margin: 0; letter-spacing: -0.3px;
}
.section-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic; color: #5C4A38; font-size: 15px;
}

/* ── CORKBOARD ─────────────────────────────────────── */
.corkboard { margin-bottom: 36px; }
.board-surface {
  background:
    radial-gradient(circle at 30% 20%, #8B7D60 0, #6E664E 60%, #544F3C 100%);
  background-blend-mode: multiply;
  border: 6px solid #2E2418;
  border-radius: 4px;
  padding: 36px 24px 28px;
  position: relative;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.3), 2px 4px 0 rgba(0,0,0,0.15);
}
.board-surface::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='c'><feTurbulence baseFrequency='0.7' numOctaves='3'/><feColorMatrix values='0 0 0 0 0.3  0 0 0 0 0.18  0 0 0 0 0.08  0 0 0 0.25 0'/></filter><rect width='100%' height='100%' filter='url(%23c)'/></svg>");
  mix-blend-mode: multiply;
  opacity: 0.4;
}
.board-notes {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
  position: relative; z-index: 1;
}
.pinned-note {
  background: #E8DFC4;
  padding: 18px 16px 14px;
  position: relative;
  box-shadow: 2px 4px 8px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.05) inset;
  font-family: 'Source Serif 4', serif;
}
.pin {
  position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #B89860, #8B2020 70%);
  box-shadow: 1px 2px 2px rgba(0,0,0,0.4);
}
.pin-clip { display: none; }
.note-title {
  font-family: 'Caveat', cursive;
  font-size: 24px; font-weight: 700;
  margin: 4px 0 8px;
  color: #5C4A38;
  line-height: 1;
}
.note-body { font-size: 14px; color: #3A2E1E; margin: 0 0 10px; }
.note-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  border-top: 1px dashed #998B6A;
  padding-top: 6px;
  font-size: 12px;
}
.note-cost { font-family: 'Inter', sans-serif; font-weight: 600; color: #1E3A52; }
.note-area { font-family: 'IM Fell English SC', serif; letter-spacing: 2px; color: #827A60; font-size: 10px; }
.note-warn {
  margin-top: 6px;
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
  color: #8B2020;
  background: rgba(139,32,32,0.1);
  padding: 3px 6px;
}

/* ── LEDGER ─────────────────────────────────────────── */
.ledger {
  background: #DDD3BC;
  border: 1px solid #B5AB8A;
  padding: 24px 28px;
  margin-bottom: 36px;
  position: relative;
  box-shadow: 0 2px 0 rgba(196,168,130,0.4);
}
.ledger::before, .ledger::after {
  content: ""; position: absolute; left: 50px; right: 50px;
  height: 1px; background: rgba(196,168,130,0.5);
}
.ledger::before { top: 4px; }
.ledger::after { bottom: 4px; }
.ledger-totals {
  display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
  align-items: center;
  border-top: 2px double #827A60;
  border-bottom: 2px double #827A60;
  padding: 18px 0;
  margin-bottom: 18px;
}
.ledger-col { text-align: center; }
.ledger-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 11px; letter-spacing: 3px; color: #827A60;
  margin-bottom: 4px;
}
.ledger-num {
  font-family: 'Playfair Display', serif;
  font-size: 38px; font-weight: 700; color: #1E3A52;
  line-height: 1;
  font-feature-settings: "tnum" 1, "lnum" 1;
}
.ledger-num.terra { color: #9C7A52; }
.ledger-sub {
  font-family: 'Source Serif 4', serif; font-style: italic;
  font-size: 12px; color: #827A60; margin-top: 4px;
}
.ledger-divider {
  width: 1px; height: 50px; background: #B5AB8A; align-self: center;
}

.ledger-categories { display: flex; flex-direction: column; gap: 10px; }
.cat-row {
  display: grid;
  grid-template-columns: 200px 1fr 180px;
  gap: 18px; align-items: center;
  padding: 6px 0;
}
.cat-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px; color: #2A1F15; font-weight: 500;
}
.cat-warn { color: #8B2020; font-weight: 700; }
.cat-hold {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 2px; color: #8B2020;
}
.cat-fig {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: #2A1F15; text-align: right;
}
.cat-fig .num { font-weight: 600; color: #1E3A52; }
.cat-of { color: #827A60; }
.cat-row.on-hold-row { opacity: 0.55; }

/* ── HOUSE SECTION ──────────────────────────────────── */
.house-section { margin-bottom: 32px; }
.house-frame {
  background: #DDD3BC;
  border: 1px solid #B5AB8A;
  padding: 20px;
  box-shadow: inset 0 0 0 1px rgba(244,233,204,0.8), 2px 3px 0 rgba(196,168,130,0.4);
}
.zone-hot {
  fill: rgba(212,168,83,0.001);
  transition: fill 0.15s ease;
}
.zone-hot:hover {
  fill: rgba(212,168,83,0.22);
}
.zone-hot.zone-active {
  fill: rgba(212,168,83,0.32);
  stroke: #B89860;
  stroke-width: 2;
  stroke-dasharray: 6 4;
}

.zone-tiles {
  display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap;
}
.zone-tile {
  font-family: 'Playfair Display', serif;
  font-size: 13px; font-weight: 600;
  background: #DDD3BC;
  border: 1.5px solid #827A60;
  padding: 10px 16px;
  cursor: pointer;
  letter-spacing: 0.5px;
  color: #2A1F15;
  display: inline-flex; align-items: center; gap: 10px;
  transition: all 0.15s;
}
.zone-tile:hover { background: #E8DFC4; }
.zone-tile.active {
  background: #1E3A52; color: #EBE4D2; border-color: #13283A;
  box-shadow: 2px 2px 0 #B89860;
}
.zone-tile.clear { border-style: dashed; }
.tile-mark {
  width: 8px; height: 8px; border-radius: 50%;
  background: #9C7A52; display: inline-block;
}
.zone-tile.active .tile-mark { background: #B89860; }

.filter-readout {
  margin-top: 16px;
  font-family: 'Playfair Display', serif;
  font-size: 15px; color: #5C4A38;
  text-align: center;
}
.filter-readout i { color: #1E3A52; font-weight: 600; }

/* ── FILTER + SORT BAR ──────────────────────────────── */
.filter-bar {
  display: flex; flex-direction: column; gap: 10px;
  padding: 18px 22px;
  margin-bottom: 28px;
  border-top: 1px solid #B5AB8A;
  border-bottom: 1px solid #B5AB8A;
  background: rgba(237,232,220,0.4);
}
.filter-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.filter-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 12px; letter-spacing: 3px; color: #5C4A38;
  min-width: 60px;
}
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.stamp-tab {
  font-family: 'Playfair Display', serif;
  font-size: 12px; font-weight: 600;
  background: #EBE4D2;
  border: 1.5px dashed #827A60;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 1.5px;
  color: #5C4A38;
  text-transform: uppercase;
  transition: all 0.15s;
}
.stamp-tab:hover { background: #E8DFC4; }
.stamp-tab.active {
  background: #9C7A52; color: #EBE4D2; border-color: #5E4528;
  border-style: solid;
  transform: rotate(-1deg);
  box-shadow: 2px 2px 0 rgba(92,61,46,0.3);
}
.stamp-tab.small { font-size: 11px; padding: 5px 12px; }
.sort-tabs .stamp-tab.active { background: #1E3A52; border-color: #13283A; transform: rotate(1deg); }

/* ── PROJECT GRID ───────────────────────────────────── */
.phase-divider {
  display: flex; align-items: center; gap: 14px;
  margin: 32px 0 18px;
}
.phase-rule {
  flex: 1; height: 0;
  border-top: 1px solid #827A60;
  border-bottom: 1px solid #827A60;
  padding-top: 2px;
}
.phase-text {
  white-space: nowrap;
  font-family: 'Playfair Display', serif;
  font-size: 13px;
}
.phase-label {
  font-size: 22px; font-weight: 700; color: #1E3A52;
  font-style: italic;
}
.phase-roman {
  font-family: 'IM Fell English SC', serif;
  letter-spacing: 3px; color: #827A60; font-size: 14px;
}
.phase-sub { font-style: italic; color: #5C4A38; font-size: 14px; }
.phase-count {
  font-family: 'Inter', sans-serif; font-size: 11px;

// ── Arts & Crafts ornamental divider ─────────────────────
function Ornament({ width = 200 }) {

// ── Status badge — rubber stamp / wax seal style ────────
function StatusBadge({ status }) {
  const map = {
    "IN PROGRESS":   { color: "#9C7A52", border: "#5E4528", rot: 1,  stamp: true,  bg: "rgba(196,98,58,0.08)" },
    "COMPLETED":     { color: "#1E3A52", border: "#13283A", rot: -2, stamp: false, bg: "rgba(45,74,45,0.08)" },
    "PLANNED":       { color: "#2F5468", border: "#2F4250", rot: 0,  stamp: true,  bg: "transparent" },
    "ON HOLD":       { color: "#8B2020", border: "#5A1212", rot: -2, stamp: true,  bg: "transparent" },
    "ACTION NEEDED": { color: "#A36A00", border: "#7A4A00", rot: 1,  stamp: true,  bg: "rgba(212,168,83,0.18)" }
  };
  const s = map[status] || map.PLANNED;
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 6,
        fontFamily: "'Playfair Display', serif",
        fontWeight: 700,
        fontSize: 10.5,
        letterSpacing: "2px",
        color: s.color,
        border: `1.8px ${status === "PLANNED" ? "dashed" : "solid"} ${s.border}`,
        padding: "4px 10px",
        background: s.bg,
        textTransform: "uppercase",
        transform: `rotate(${s.rot}deg)`,
        borderRadius: 2,
        boxShadow: status === "COMPLETED" ? "inset 0 0 0 2px #1E3A52, 0 0 0 1px #EBE4D2" : "none"
      }}
    >
      {status === "COMPLETED" && <span style={{ fontSize: 11 }}>✓</span>}
      {status === "ACTION NEEDED" && <span style={{ fontSize: 11 }}>!</span>}
      {status}
    </span>
  );
}

// ── Measuring-tape progress bar ─────────────────────────
function TapeBar({ value, max, alert }) {
  const pct = max > 0 ? Math.min(100, (value / max) * 100) : 0;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div
        style={{
          position: "relative",
          flex: 1,
          height: 10,
          background: "#E0CFA9",
          border: "1px solid #827A60",
          borderRadius: 0,
          overflow: "hidden"
        }}
      >
        <div
          style={{
            width: `${pct}%`,
            height: "100%",
            background: alert
              ? "repeating-linear-gradient(45deg,#8B2020 0 4px,#A33030 4px 8px)"
              : "linear-gradient(180deg,#9C7A52,#A14A2A)",
            transition: "width 0.4s ease"
          }}
        />
        {/* tape ticks */}
        {Array.from({ length: 20 }).map((_, i) => (
          <div
            key={i}
            style={{
              position: "absolute",
              left: `${i * 5}%`,
              top: 0,
              width: 1,
              height: i % 4 === 0 ? 10 : 5,
              background: "rgba(92,61,46,0.35)"
            }}
          />
        ))}
      </div>
      <span style={{ fontFamily: "Inter, sans-serif", fontSize: 11, color: "#5C4A38", minWidth: 36, textAlign: "right" }}>
        {Math.round(pct)}%
      </span>
    </div>
  );
}

      className="pinned-note"
      style={{
        transform: `rotate(${rot}deg)`,
        background: color
      }}
    >
      <div className="pin" />
      <div className="pin-clip">📌</div>
      <h4 className="note-title">{title}</h4>
      <p className="note-body">{body}</p>
      <div className="note-meta">
        <span className="note-cost">{cost}</span>
        <span className="note-area">{area}</span>
      </div>
      {warn && <div className="note-warn">⚠ {warn}</div>}
    </div>
  );
}

// ── Phase divider ───────────────────────────────────────
function PhaseDivider({ phase, count }) {
  return (
    <div className="phase-divider">
      <span className="phase-rule" />
      <span className="phase-text">
        <span className="phase-label">{phase.label}</span>
        {phase.roman && <span className="phase-roman"> · {phase.roman}</span>}
        {phase.sub && <span className="phase-sub"> ({phase.sub})</span>}
        <span className="phase-count"> — {count} {count === 1 ? "project" : "projects"}</span>
      </span>
      <span className="phase-rule" />
    </div>
  );
}

// ── GLANCE VIEW — clean at-a-glance table ───────────────
function GlanceView({ projects, totals }) {
  const groups = [
    { key: "ACTION NEEDED", label: "Action Needed",  tone: "amber" },
    { key: "IN PROGRESS",   label: "In Progress",    tone: "terra" },
    { key: "PLANNED",       label: "Planned · Upcoming", tone: "slate" },
    { key: "COMPLETED",     label: "Completed",      tone: "green" },
    { key: "ON HOLD",       label: "On Hold",        tone: "red" }
  ];

  return (
    <div className="glance">
      {/* Quick stats strip */}
      <div className="glance-stats">
        <div className="gstat">
          <div className="gstat-label">Active Now</div>
          <div className="gstat-value">{projects.filter(p => p.status === "IN PROGRESS").length}</div>
        </div>
        <div className="gstat alert">
          <div className="gstat-label">Action Needed</div>
          <div className="gstat-value">{projects.filter(p => p.status === "ACTION NEEDED").length}</div>
        </div>
        <div className="gstat">
          <div className="gstat-label">Planned</div>
          <div className="gstat-value">{projects.filter(p => p.status === "PLANNED").length}</div>
        </div>
        <div className="gstat done">
          <div className="gstat-label">Completed</div>
          <div className="gstat-value">{projects.filter(p => p.status === "COMPLETED").length}</div>
        </div>
        <div className="gstat hold">
          <div className="gstat-label">On Hold</div>
          <div className="gstat-value">{projects.filter(p => p.status === "ON HOLD").length}</div>
        </div>
        <div className="gstat money">
          <div className="gstat-label">Paid to date</div>
          <div className="gstat-value">{fmtMoney(totals.paid)}</div>
        </div>
      </div>

      {groups.map(g => {
        const list = projects.filter(p => p.status === g.key);
        if (list.length === 0) return null;
        return (
          <div key={g.key} className={`glance-group tone-${g.tone}`}>
            <div className="glance-group-head">
              <span className={`glance-dot tone-${g.tone}`} />
              <h3 className="glance-group-title">{g.label}</h3>
              <span className="glance-group-count">{list.length}</span>
            </div>
            <div className="glance-table">
              <div className="glance-row glance-head-row">
                <div>Project</div>
                <div>Area</div>
                <div>Contractor</div>
                <div>Timeline</div>
                <div className="right">Estimated</div>
                <div className="right">Paid</div>
              </div>
              {list.map(p => {
                const pct = p.estimated ? Math.round(((p.paid || 0) / p.estimated) * 100) : null;
                return (
                  <div key={p.id} className="glance-row">
                    <div className="glance-name">
                      {p.name}
                      {p.contractorPhone && (
                        <span className="glance-phone"> · {p.contractorPhone}</span>
                      )}
                    </div>
                    <div className="glance-area">{p.area}</div>
                    <div className="glance-contractor">
                      {p.isDIY ? <span className="diy-mini">DIY</span> : p.contractor}
                    </div>
                    <div className="glance-time">{p.timeline || "—"}</div>
                    <div className="right glance-money">
                      {p.estimated == null ? (p.estimatedNote || "TBD") : fmtMoney(p.estimated)}
                    </div>
                    <div className="right glance-money">
                      <span className={p.paid > 0 && p.paid >= (p.estimated || 0) ? "paid-full" : ""}>
                        {fmtMoney(p.paid || 0)}
                      </span>
                      {pct !== null && p.estimated > 0 && p.status !== "COMPLETED" && (
                        <span className="glance-pct"> ({pct}%)</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── MAIN APP ────────────────────────────────────────────
function Dashboard() {
  const [tab, setTab] = React.useState("journal"); // "journal" | "glance"
  const [zone, setZone] = React.useState(null);
  const [status, setStatus] = React.useState("All");
  const [sort, setSort] = React.useState("Phase");
  const [expanded, setExpanded] = React.useState({});
  const [rolodexOpen, setRolodexOpen] = React.useState(false);

  const projects = window.PROJECTS;
  const contractors = window.CONTRACTORS;

  const today = new Date(2026, 4, 18); // May 18, 2026
  const todayLong = today.toLocaleDateString("en-US", {
    year: "numeric", month: "long", day: "numeric"
  });

  // Totals
  const totals = React.useMemo(() => {
    let est = 0, paid = 0;
    projects.forEach(p => {
      if (p.status !== "ON HOLD" && p.estimated) est += p.estimated;
      paid += (p.paid || 0);
    });
    return {
      est,
      paid,
      remaining: est - paid,
      active: projects.filter(p => p.status === "IN PROGRESS").length,
      tracked: projects.length
    };
  }, [projects]);

  // Category breakdown
  const categories = React.useMemo(() => [
    { name: "Interior Finishes", paid: 11660, total: 11660 },
    { name: "Windows & Doors",   paid: 4450,  total: 8200 },
    { name: "Wildlife Removal",  paid: 0,     total: 1764, alert: true },
    { name: "Outdoor & Garden",  paid: 1100,  total: 2204 },
    { name: "Plumbing & Baths",  paid: 0,     total: 47000, onHold: true }
  ], []);

  // Filtered + sorted projects
  const filtered = React.useMemo(() => {
    let list = projects.slice();
    if (zone) list = list.filter(p => p.zone === zone);
    if (status !== "All") {
      const map = {
        "In Progress": "IN PROGRESS",
        "Completed": "COMPLETED",
        "Planned": "PLANNED",
        "On Hold": "ON HOLD",
        "Action Needed": "ACTION NEEDED"
      };
      list = list.filter(p => p.status === map[status]);
    }
    if (sort === "Budget ↓") {
      list.sort((a, b) => (b.estimated || 0) - (a.estimated || 0));
    } else if (sort === "Contractor") {
      list.sort((a, b) => (a.contractor || "").localeCompare(b.contractor || ""));
    } else if (sort === "Area") {
      list.sort((a, b) => a.area.localeCompare(b.area));
    }
    return list;
  }, [projects, zone, status, sort]);

  // Group by phase
  const grouped = React.useMemo(() => {
    if (sort !== "Phase") return null;
    const g = {};
    PHASES.forEach(ph => { g[ph.id] = []; });
    filtered.forEach(p => { if (g[p.phase]) g[p.phase].push(p); });
    return g;
  }, [filtered, sort]);

  const activeZoneLabel = zone
    ? (window.ZONES.find(z => z.id === zone)?.label || "")
    : "All";

  return (
    <div className="dashboard">
      {/* ── MASTHEAD ───────────────────────────────────── */}
      <header className="masthead">
        <div className="masthead-top">
          <div>
            <div className="eyebrow">Renovation Journal</div>
            <h1 className="address">3685 Pershing Ave</h1>
            <div className="subaddress">North Park · San Diego · Est. <span className="num">1924</span></div>
          </div>
          <div className="masthead-right">
            <div className="date-stamp">
              <div className="date-label">As of</div>
              <div className="date-value">{todayLong}</div>
            </div>
            <button className="print-seal" onClick={() => window.print()} title="Print Summary">
              <svg viewBox="0 0 64 64" width="56" height="56">
                <circle cx="32" cy="32" r="29" fill="#8B2020" stroke="#5A1212" strokeWidth="2" />
                <circle cx="32" cy="32" r="24" fill="none" stroke="#EBE4D2" strokeWidth="0.8" strokeDasharray="2 2" />
                <text x="32" y="28" textAnchor="middle" fontFamily="'Playfair Display', serif" fontSize="8.5" fill="#EBE4D2" letterSpacing="1.2">PRINT</text>
                <text x="32" y="40" textAnchor="middle" fontFamily="'Playfair Display', serif" fontSize="7.5" fill="#EBE4D2" letterSpacing="1">SUMMARY</text>
                <line x1="14" y1="46" x2="50" y2="46" stroke="#EBE4D2" strokeWidth="0.6" />
              </svg>
            </button>
          </div>
        </div>

        <div className="ornament-row">
          <Ornament width={320} />
        </div>

        <div className="pulse-line">
          <span><b className="num">{totals.tracked}</b> projects tracked</span>
          <span className="dot-sep">·</span>
          <span><b className="num">{fmtMoney(totals.est)}</b> estimated</span>
          <span className="dot-sep">·</span>
          <span><b className="num">{fmtMoney(totals.paid)}</b> paid</span>
          <span className="dot-sep">·</span>
          <span><b className="num">{totals.active}</b> active this month</span>
        </div>
      </header>

      {/* ── TABS ────────────────────────────────────────── */}
      <div className="tab-bar">
        <button
          className={`tab ${tab === "journal" ? "active" : ""}`}
          onClick={() => setTab("journal")}
        >
          <span className="tab-num">I.</span>
          <span className="tab-label">The Journal</span>
          <span className="tab-sub">Full illustrated view</span>
        </button>
        <button
          className={`tab ${tab === "glance" ? "active" : ""}`}
          onClick={() => setTab("glance")}
        >
          <span className="tab-num">II.</span>
          <span className="tab-label">At a Glance</span>
          <span className="tab-sub">Clean project table</span>
        </button>
      </div>

      {/* ── ACTION NEEDED BANNER ────────────────────────── */}
      <div className="alert-notice">
        <div className="notice-stamp">
          <svg viewBox="0 0 40 40" width="40" height="40">
            <circle cx="20" cy="20" r="18" fill="none" stroke="#8B2020" strokeWidth="2" />
            <text x="20" y="27" textAnchor="middle" fontFamily="'Playfair Display', serif" fontSize="22" fill="#8B2020" fontWeight="700">!</text>
          </svg>
        </div>
        <div className="notice-body">
          <div className="notice-label">— NOTICE · ACTION REQUIRED —</div>
          <div className="notice-text">
            <b>WRS Wildlife Removal — Estimate #3155 expired April 23, 2026.</b>
            <br />
            Call Joey Caro at <span className="phone-num">619-786-6440</span> to renew before booking. <i>June 2026 start date at risk.</i>
          </div>
        </div>
        <div className="telegram-stripe" />
      </div>

      {tab === "glance" && <GlanceView projects={projects} totals={totals} />}

      {tab === "journal" && <React.Fragment>

      {/* ── FOREMAN'S BOARD ─────────────────────────────── */}
      <section className="corkboard">
        <div className="section-head">
          <h2 className="section-title">Foreman's Board</h2>
          <span className="section-sub">— What's happening now · May–June 2026 —</span>
        </div>
        <div className="board-surface">
          <div className="board-notes">
            <PinnedNote
              rot={-2.2}
              color="#F4E9CC"
              title="Heartwood Restoration"
              body="Window casement install in progress. May 20 → May 30, 2026."
              cost="$4,200 · $450 paid"
              area="Living Room"
            />
            <PinnedNote
              rot={1.5}
              color="#F5DCC4"
              title="WRS Wildlife"
              body="Rodent trapping & exclusion — attic + crawl space."
              cost="$1,764 estimated"
              area="Crawlspace & Attic"
              warn="Renew estimate before booking"
            />
            <PinnedNote
              rot={-1.3}
              color="#EBE3CE"
              title="Ismael — Floors"
              body="Hardwood floor refinish complete. ✓ Paid in full."
              cost="$7,360 PAID"
              area="Whole House"
            />
          </div>
        </div>
      </section>

      {/* ── BUDGET LEDGER ───────────────────────────────── */}
      <section className="ledger">
        <div className="section-head">
          <h2 className="section-title">Project Ledger</h2>
          <span className="section-sub">— Estimated · Paid · Remaining —</span>
        </div>

        <div className="ledger-totals">
          <div className="ledger-col">
            <div className="ledger-label">Estimated</div>
            <div className="ledger-num">{fmtMoney(totals.est)}</div>
            <div className="ledger-sub">active projects</div>
          </div>
          <div className="ledger-divider" />
          <div className="ledger-col">
            <div className="ledger-label">Paid / Committed</div>
            <div className="ledger-num terra">{fmtMoney(totals.paid)}</div>
            <div className="ledger-sub">across {totals.tracked} entries</div>
          </div>
          <div className="ledger-divider" />
          <div className="ledger-col">
            <div className="ledger-label">Remaining</div>
            <div className="ledger-num">{fmtMoney(totals.remaining)}</div>
            <div className="ledger-sub">to be billed</div>
          </div>
        </div>

        <div className="ledger-categories">
          {categories.map(c => (
            <div key={c.name} className={`cat-row ${c.onHold ? "on-hold-row" : ""}`}>
              <div className="cat-name">
                {c.name}
                {c.alert && <span className="cat-warn"> ⚠</span>}
                {c.onHold && <span className="cat-hold"> (ON HOLD)</span>}
              </div>
              <div className="cat-bar">
                <TapeBar value={c.paid} max={c.total} alert={c.alert} />
              </div>
              <div className="cat-fig">
                <span className="num">{fmtMoney(c.paid)}</span>
                <span className="cat-of"> of </span>
                <span className="num">{fmtMoney(c.total)}</span>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* ── HOUSE SELECTOR ──────────────────────────────── */}
      <section className="house-section">
        <div className="section-head">
          <h2 className="section-title">The Facade</h2>
          <span className="section-sub">— Click a zone to filter projects —</span>
        </div>

        <div className="house-frame">
          <window.HouseElevation
            activeZone={zone}
            onZoneClick={(z) => setZone(zone === z ? null : z)}
          />
        </div>

        <div className="zone-tiles">
          {window.ZONES.filter(z => z.on === "tile").map(z => (
            <button
              key={z.id}
              className={`zone-tile ${zone === z.id ? "active" : ""}`}
              onClick={() => setZone(zone === z.id ? null : z.id)}
            >
              <span className="tile-mark" />
              <span className="tile-label">{z.label}</span>
            </button>
          ))}
          <button
            className={`zone-tile clear ${!zone ? "active" : ""}`}
            onClick={() => setZone(null)}
          >
            <span className="tile-mark" />
            <span className="tile-label">All Zones</span>
          </button>
        </div>

        <div className="filter-readout">
          Showing: <i>{activeZoneLabel}</i> {zone ? "projects" : "projects"}
        </div>
      </section>

      {/* ── FILTER + SORT BAR ───────────────────────────── */}
      <section className="filter-bar">
        <div className="filter-row">
          <span className="filter-label">Status</span>
          <div className="filter-tabs">
            {STATUSES.map(s => (
              <button
                key={s}
                className={`stamp-tab ${status === s ? "active" : ""}`}
                onClick={() => setStatus(s)}
              >
                {s}
              </button>
            ))}
          </div>
        </div>
        <div className="filter-row">
          <span className="filter-label">Sort</span>
          <div className="filter-tabs sort-tabs">
            {SORTS.map(s => (
              <button
                key={s}
                className={`stamp-tab small ${sort === s ? "active" : ""}`}
                onClick={() => setSort(s)}
              >
                {s}
              </button>
            ))}
          </div>
        </div>
      </section>

      {/* ── PROJECT GRID ────────────────────────────────── */}
      <section className="projects">
        {sort === "Phase" ? (
          PHASES.map(ph => {
            const list = grouped[ph.id] || [];
            if (list.length === 0) return null;
            return (
              <div key={ph.id} className="phase-group">
                <PhaseDivider phase={ph} count={list.length} />
                <div className="project-grid">
                  {list.map(p => (
                    <ProjectCard
                      key={p.id}
                      p={p}
                      expanded={!!expanded[p.id]}
                      onToggle={() =>
                        setExpanded(e => ({ ...e, [p.id]: !e[p.id] }))
                      }
                    />
                  ))}
                </div>
              </div>
            );
          })
        ) : (
          <div className="project-grid">
            {filtered.map(p => (
              <ProjectCard
                key={p.id}
                p={p}
                expanded={!!expanded[p.id]}
                onToggle={() =>
                  setExpanded(e => ({ ...e, [p.id]: !e[p.id] }))
                }
              />
            ))}
          </div>
        )}
        {filtered.length === 0 && (
          <div className="empty-state">
            <Ornament width={120} />
            <p>No projects match this view.</p>
            <button onClick={() => { setZone(null); setStatus("All"); }}>Clear filters</button>
          </div>
        )}
      </section>

      {/* ── CONTRACTOR ROLODEX ──────────────────────────── */}
      <section className="rolodex-section">
        <button
          className="rolodex-toggle"
          onClick={() => setRolodexOpen(o => !o)}
        >
          <span>Open Contractor Files</span>
          <span className="caret">{rolodexOpen ? "▴" : "▾"}</span>
        </button>
        {rolodexOpen && (
          <div className="rolodex">
            {contractors.map(c => (
              <div key={c.name} className={`calling-card ${c.alert ? "alert" : ""}`}>
                <div className="card-corner tl" />
                <div className="card-corner tr" />
                <div className="card-corner bl" />
                <div className="card-corner br" />
                <div className="card-eyebrow">— Calling Card —</div>
                <div className="card-name">{c.name}</div>
                <div className="card-spec">{c.specialty}</div>
                <Ornament width={100} />
                <div className="card-foot">
                  <div className="card-paid">
                    <span className="card-paid-label">paid to date</span>
                    <span className="card-paid-val num">{fmtMoney(c.paid)}</span>
                  </div>
                  <div className="card-note">{c.note}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      </React.Fragment>}

      {/* ── COLOPHON ────────────────────────────────────── */}
      <footer className="colophon">
        <Ornament width={260} />
        <p>
          Compiled with care for the residents of 3685 Pershing Avenue ·
          A Spanish Revival bungalow in the North Park district of San Diego, California ·
          One hundred and two years young.
        </p>
        <div className="colophon-meta">
          <span>3 BED · 2 BATH · 1,190 SQ FT · 7,501 SQ FT LOT</span>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);

  </script>
</body>
</html>
