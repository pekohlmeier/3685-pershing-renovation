<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3685 Pershing Ave · Renovation Journal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;700&family=IM+Fell+English+SC&display=swap');

/* ── BASE ───────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Source Serif 4', 'Georgia', serif;
  color: #2A1F15;
  background: #F5F0E8;
  /* linen / paper noise */
  background-image:
    radial-gradient(circle at 20% 30%, rgba(196,168,130,0.06) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(196,98,58,0.04) 0, transparent 40%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.36  0 0 0 0 0.28  0 0 0 0 0.18  0 0 0 0.07 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  line-height: 1.55;
  font-size: 16px;
  min-height: 100vh;
}

#root { max-width: 1240px; margin: 0 auto; padding: 36px 28px 80px; }

.num { font-family: 'Inter', sans-serif; font-feature-settings: "tnum" 1, "lnum" 1; }

/* ── MASTHEAD ───────────────────────────────────────── */
.masthead { padding-bottom: 18px; border-bottom: 1px solid #C4A882; margin-bottom: 26px; }
.masthead-top {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; flex-wrap: wrap;
}
.eyebrow {
  font-family: 'IM Fell English SC', 'Playfair Display', serif;
  font-size: 12px; letter-spacing: 4px; color: #8B7355;
  margin-bottom: 4px;
}
.address {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: clamp(40px, 6vw, 76px);
  line-height: 0.96;
  margin: 0;
  color: #2D4A2D;
  letter-spacing: -1px;
}
.subaddress {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 17px;
  color: #5C3D2E;
  margin-top: 6px;
  letter-spacing: 0.5px;
}
.masthead-right {
  display: flex; align-items: flex-end; gap: 18px;
}
.date-stamp {
  border: 1px dashed #8B7355;
  padding: 8px 14px;
  background: rgba(237,232,220,0.6);
  text-align: right;
}
.date-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 3px; color: #8B7355;
}
.date-value {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: #2D4A2D; font-weight: 600;
}
.print-seal {
  background: none; border: none; cursor: pointer; padding: 0;
  filter: drop-shadow(2px 3px 1px rgba(92,61,46,0.25));
  transition: transform 0.15s;
}
.print-seal:hover { transform: rotate(-6deg) scale(1.05); }

.ornament-row { display: flex; justify-content: center; margin: 18px 0 14px; }

.pulse-line {
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px;
  font-family: 'Source Serif 4', serif;
  font-size: 15px; color: #2A1F15;
  justify-content: center;
}
.pulse-line b { font-weight: 700; color: #2D4A2D; font-size: 16px; }
.dot-sep { color: #8B7355; padding: 0 2px; }

/* ── ALERT NOTICE ───────────────────────────────────── */
.alert-notice {
  position: relative;
  display: flex; align-items: center; gap: 18px;
  background: linear-gradient(180deg, #F2DAA8, #EAC988);
  border: 1.5px solid #8B5A1F;
  border-left: 8px solid #8B2020;
  padding: 16px 22px 16px 18px;
  margin-bottom: 32px;
  font-family: 'Source Serif 4', serif;
  box-shadow: 2px 3px 0 rgba(92,61,46,0.18);
}
.alert-notice::before {
  content: ""; position: absolute; inset: 4px;
  border: 1px dashed rgba(139,32,32,0.35);
  pointer-events: none;
}
.notice-stamp { flex: 0 0 auto; }
.notice-body { flex: 1; }
.notice-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 11px; letter-spacing: 4px; color: #8B2020;
  margin-bottom: 4px;
}
.notice-text { color: #3A1010; font-size: 15px; line-height: 1.5; }
.phone-num {
  font-family: 'Inter', sans-serif; font-weight: 600;
  background: #8B2020; color: #F5F0E8; padding: 1px 6px;
  letter-spacing: 0.5px;
}
.telegram-stripe {
  position: absolute; left: 0; right: 0; bottom: -6px; height: 6px;
  background: repeating-linear-gradient(45deg, #8B2020 0 8px, #F5F0E8 8px 16px);
  opacity: 0.5;
}

/* ── SECTION CHROME ─────────────────────────────────── */
.section-head {
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700; font-size: 28px; color: #2D4A2D;
  margin: 0; letter-spacing: -0.3px;
}
.section-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic; color: #5C3D2E; font-size: 15px;
}

/* ── CORKBOARD ─────────────────────────────────────── */
.corkboard { margin-bottom: 36px; }
.board-surface {
  background:
    radial-gradient(circle at 30% 20%, #B88958 0, #9C6D3F 60%, #7A4F26 100%);
  background-blend-mode: multiply;
  border: 6px solid #3A2415;
  border-radius: 4px;
  padding: 36px 24px 28px;
  position: relative;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.3), 2px 4px 0 rgba(0,0,0,0.15);
}
.board-surface::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='c'><feTurbulence baseFrequency='0.7' numOctaves='3'/><feColorMatrix values='0 0 0 0 0.3  0 0 0 0 0.18  0 0 0 0 0.08  0 0 0 0.25 0'/></filter><rect width='100%' height='100%' filter='url(%23c)'/></svg>");
  mix-blend-mode: multiply;
  opacity: 0.4;
}
.board-notes {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
  position: relative; z-index: 1;
}
.pinned-note {
  background: #F4E9CC;
  padding: 18px 16px 14px;
  position: relative;
  box-shadow: 2px 4px 8px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.05) inset;
  font-family: 'Source Serif 4', serif;
}
.pin {
  position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #E55B3A, #8B2020 70%);
  box-shadow: 1px 2px 2px rgba(0,0,0,0.4);
}
.pin-clip { display: none; }
.note-title {
  font-family: 'Caveat', cursive;
  font-size: 24px; font-weight: 700;
  margin: 4px 0 8px;
  color: #5C3D2E;
  line-height: 1;
}
.note-body { font-size: 14px; color: #3A2818; margin: 0 0 10px; }
.note-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  border-top: 1px dashed #A88859;
  padding-top: 6px;
  font-size: 12px;
}
.note-cost { font-family: 'Inter', sans-serif; font-weight: 600; color: #2D4A2D; }
.note-area { font-family: 'IM Fell English SC', serif; letter-spacing: 2px; color: #8B7355; font-size: 10px; }
.note-warn {
  margin-top: 6px;
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
  color: #8B2020;
  background: rgba(139,32,32,0.1);
  padding: 3px 6px;
}

/* ── LEDGER ─────────────────────────────────────────── */
.ledger {
  background: #EDE8DC;
  border: 1px solid #C4A882;
  padding: 24px 28px;
  margin-bottom: 36px;
  position: relative;
  box-shadow: 0 2px 0 rgba(196,168,130,0.4);
}
.ledger::before, .ledger::after {
  content: ""; position: absolute; left: 50px; right: 50px;
  height: 1px; background: rgba(196,168,130,0.5);
}
.ledger::before { top: 4px; }
.ledger::after { bottom: 4px; }
.ledger-totals {
  display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
  align-items: center;
  border-top: 2px double #8B7355;
  border-bottom: 2px double #8B7355;
  padding: 18px 0;
  margin-bottom: 18px;
}
.ledger-col { text-align: center; }
.ledger-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 11px; letter-spacing: 3px; color: #8B7355;
  margin-bottom: 4px;
}
.ledger-num {
  font-family: 'Playfair Display', serif;
  font-size: 38px; font-weight: 700; color: #2D4A2D;
  line-height: 1;
  font-feature-settings: "tnum" 1, "lnum" 1;
}
.ledger-num.terra { color: #C4623A; }
.ledger-sub {
  font-family: 'Source Serif 4', serif; font-style: italic;
  font-size: 12px; color: #8B7355; margin-top: 4px;
}
.ledger-divider {
  width: 1px; height: 50px; background: #C4A882; align-self: center;
}

.ledger-categories { display: flex; flex-direction: column; gap: 10px; }
.cat-row {
  display: grid;
  grid-template-columns: 200px 1fr 180px;
  gap: 18px; align-items: center;
  padding: 6px 0;
}
.cat-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px; color: #2A1F15; font-weight: 500;
}
.cat-warn { color: #8B2020; font-weight: 700; }
.cat-hold {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 2px; color: #8B2020;
}
.cat-fig {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: #2A1F15; text-align: right;
}
.cat-fig .num { font-weight: 600; color: #2D4A2D; }
.cat-of { color: #8B7355; }
.cat-row.on-hold-row { opacity: 0.55; }

/* ── HOUSE SECTION ──────────────────────────────────── */
.house-section { margin-bottom: 32px; }
.house-frame {
  background: #EDE8DC;
  border: 1px solid #C4A882;
  padding: 20px;
  box-shadow: inset 0 0 0 1px rgba(244,233,204,0.8), 2px 3px 0 rgba(196,168,130,0.4);
}
.zone-hot {
  fill: rgba(212,168,83,0.001);
  transition: fill 0.15s ease;
}
.zone-hot:hover {
  fill: rgba(212,168,83,0.22);
}
.zone-hot.zone-active {
  fill: rgba(212,168,83,0.32);
  stroke: #D4A853;
  stroke-width: 2;
  stroke-dasharray: 6 4;
}

.zone-tiles {
  display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap;
}
.zone-tile {
  font-family: 'Playfair Display', serif;
  font-size: 13px; font-weight: 600;
  background: #EDE8DC;
  border: 1.5px solid #8B7355;
  padding: 10px 16px;
  cursor: pointer;
  letter-spacing: 0.5px;
  color: #2A1F15;
  display: inline-flex; align-items: center; gap: 10px;
  transition: all 0.15s;
}
.zone-tile:hover { background: #F4E9CC; }
.zone-tile.active {
  background: #2D4A2D; color: #F5F0E8; border-color: #1F3320;
  box-shadow: 2px 2px 0 #D4A853;
}
.zone-tile.clear { border-style: dashed; }
.tile-mark {
  width: 8px; height: 8px; border-radius: 50%;
  background: #C4623A; display: inline-block;
}
.zone-tile.active .tile-mark { background: #D4A853; }

.filter-readout {
  margin-top: 16px;
  font-family: 'Playfair Display', serif;
  font-size: 15px; color: #5C3D2E;
  text-align: center;
}
.filter-readout i { color: #2D4A2D; font-weight: 600; }

/* ── FILTER + SORT BAR ──────────────────────────────── */
.filter-bar {
  display: flex; flex-direction: column; gap: 10px;
  padding: 18px 22px;
  margin-bottom: 28px;
  border-top: 1px solid #C4A882;
  border-bottom: 1px solid #C4A882;
  background: rgba(237,232,220,0.4);
}
.filter-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.filter-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 12px; letter-spacing: 3px; color: #5C3D2E;
  min-width: 60px;
}
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.stamp-tab {
  font-family: 'Playfair Display', serif;
  font-size: 12px; font-weight: 600;
  background: #F5F0E8;
  border: 1.5px dashed #8B7355;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 1.5px;
  color: #5C3D2E;
  text-transform: uppercase;
  transition: all 0.15s;
}
.stamp-tab:hover { background: #F4E9CC; }
.stamp-tab.active {
  background: #C4623A; color: #F5F0E8; border-color: #8B3A1F;
  border-style: solid;
  transform: rotate(-1deg);
  box-shadow: 2px 2px 0 rgba(92,61,46,0.3);
}
.stamp-tab.small { font-size: 11px; padding: 5px 12px; }
.sort-tabs .stamp-tab.active { background: #2D4A2D; border-color: #1F3320; transform: rotate(1deg); }

/* ── PROJECT GRID ───────────────────────────────────── */
.phase-divider {
  display: flex; align-items: center; gap: 14px;
  margin: 32px 0 18px;
}
.phase-rule {
  flex: 1; height: 0;
  border-top: 1px solid #8B7355;
  border-bottom: 1px solid #8B7355;
  padding-top: 2px;
}
.phase-text {
  white-space: nowrap;
  font-family: 'Playfair Display', serif;
  font-size: 13px;
}
.phase-label {
  font-size: 22px; font-weight: 700; color: #2D4A2D;
  font-style: italic;
}
.phase-roman {
  font-family: 'IM Fell English SC', serif;
  letter-spacing: 3px; color: #8B7355; font-size: 14px;
}
.phase-sub { font-style: italic; color: #5C3D2E; font-size: 14px; }
.phase-count {
  font-family: 'Inter', sans-serif; font-size: 11px;
  color: #8B7355; letter-spacing: 1px;
}

.project-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px;
}

.project-card {
  position: relative;
  background: #EDE8DC;
  border: 1px solid #C4A882;
  padding: 18px 20px 16px;
  cursor: pointer;
  box-shadow: 2px 3px 0 rgba(196,168,130,0.4), 0 0 0 1px rgba(244,233,204,0.6) inset;
  transition: transform 0.15s, box-shadow 0.15s;
  overflow: hidden;
}
.project-card:hover {
  transform: translate(-1px, -2px);
  box-shadow: 4px 6px 0 rgba(196,168,130,0.4), 0 0 0 1px rgba(244,233,204,0.6) inset;
}
.project-card.on-hold {
  filter: saturate(0.45);
  background: #E5DECD;
}
.project-card.completed {
  background: linear-gradient(180deg, #E5EBDC, #EDE8DC);
  border-color: #9CAA88;
}
.project-card.action {
  border-color: #D4A853;
  box-shadow: 0 0 0 2px #D4A853, 2px 3px 0 rgba(196,168,130,0.4);
  animation: pulseAction 2.5s ease-in-out infinite;
}
@keyframes pulseAction {
  0%, 100% { box-shadow: 0 0 0 2px rgba(212,168,83,0.6), 2px 3px 0 rgba(196,168,130,0.4); }
  50% { box-shadow: 0 0 0 4px rgba(212,168,83,0.9), 2px 3px 0 rgba(196,168,130,0.4); }
}

.hold-stamp {
  position: absolute; top: 38%; left: 50%;
  transform: translate(-50%, -50%) rotate(-12deg);
  font-family: 'Playfair Display', serif;
  font-weight: 800; font-size: 42px;
  letter-spacing: 8px;
  color: #8B2020;
  border: 4px solid #8B2020;
  padding: 4px 16px;
  background: rgba(245,240,232,0.4);
  pointer-events: none;
  opacity: 0.78;
  z-index: 5;
}

.card-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 10px; margin-bottom: 10px;
}
.area-tag {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 2.5px;
  background: #F5F0E8;
  border: 1px solid #8B7355;
  padding: 3px 9px;
  border-radius: 999px;
  color: #5C3D2E;
  white-space: nowrap;
}

.project-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; color: #2A1F15;
  margin: 4px 0 6px;
  line-height: 1.15;
  letter-spacing: -0.2px;
}

.contractor-line {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  font-family: 'Source Serif 4', serif;
  font-size: 13px; color: #5C3D2E;
  margin-bottom: 12px;
}
.contractor-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: #F5F0E8;
  border: 1px solid #C4A882;
  padding: 3px 10px;
  font-style: italic;
}
.contractor-chip .dot {
  width: 6px; height: 6px; border-radius: 50%; background: #4A6274;
}
.diy-tag {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 3px;
  background: #2D4A2D; color: #F5F0E8;
  padding: 3px 10px;
}
.phone { font-family: 'Inter', sans-serif; font-size: 11px; }

.timeline-row {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px dashed #C4A882;
}
.timeline-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 2.5px; color: #8B7355;
}
.timeline-value {
  font-family: 'Source Serif 4', serif;
  font-size: 13px; color: #2A1F15;
}

.money-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 10px;
}
.money-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px; letter-spacing: 2.5px; color: #8B7355;
}
.money-value {
  font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: 18px; color: #2D4A2D;
  font-feature-settings: "tnum" 1, "lnum" 1;
}
.money-note {
  font-family: 'Source Serif 4', serif; font-style: italic;
  font-size: 11px; color: #8B7355;
}

.notes-toggle {
  margin-top: 12px;
  background: none; border: none; cursor: pointer;
  font-family: 'Playfair Display', serif;
  font-size: 13px; color: #5C3D2E; font-style: italic;
  padding: 0;
}
.notes-toggle:hover { color: #C4623A; }

.notes-body {
  margin-top: 10px;
  padding: 12px 14px;
  background: rgba(245,240,232,0.7);
  border-left: 2px solid #C4623A;
  font-family: 'Source Serif 4', serif;
  font-size: 13.5px;
  color: #3A2818;
}
.notes-body p { margin: 0 0 12px; }

.polaroid {
  margin-top: 14px;
  display: flex; flex-direction: column; align-items: center;
}
.polaroid-frame {
  width: 80%; aspect-ratio: 4 / 3;
  background: #F5F0E8;
  border: 1.5px dashed #8B7355;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px;
  color: #8B7355;
  padding: 14px;
  box-shadow: 0 0 0 6px #EDE8DC, 0 0 0 7px #C4A882;
}
.polaroid-icon { font-size: 24px; opacity: 0.5; }
.polaroid-text {
  font-family: 'IM Fell English SC', serif;
  font-size: 11px; letter-spacing: 3px;
}
.polaroid-caption {
  font-family: 'Caveat', cursive;
  font-size: 15px; color: #5C3D2E;
  margin-top: 8px;
}

.empty-state {
  text-align: center; padding: 40px;
  font-family: 'Playfair Display', serif;
  color: #5C3D2E;
}
.empty-state button {
  margin-top: 12px;
  font-family: 'Playfair Display', serif;
  background: #2D4A2D; color: #F5F0E8;
  border: none; padding: 8px 16px; cursor: pointer;
  letter-spacing: 1px;
}

/* ── ROLODEX ────────────────────────────────────────── */
.rolodex-section { margin-top: 40px; }
.rolodex-toggle {
  width: 100%;
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600;
  background: #5C3D2E; color: #F5F0E8;
  border: none; padding: 14px 24px;
  cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: 1.5px;
  border-radius: 2px;
  box-shadow: 2px 3px 0 rgba(92,61,46,0.4);
}
.rolodex-toggle:hover { background: #4A2F1C; }
.caret { font-size: 14px; }

.rolodex {
  margin-top: 20px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 22px;
}
.calling-card {
  position: relative;
  background: #F4E9CC;
  border: 1px solid #C4A882;
  padding: 20px;
  text-align: center;
  box-shadow: 2px 3px 0 rgba(196,168,130,0.5);
  font-family: 'Source Serif 4', serif;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.calling-card.alert {
  background: #F2DAA8;

.card-corner {
  position: absolute; width: 14px; height: 14px;

.card-corner.tl { top: 6px; left: 6px; border-right: none; border-bottom: none; }
.card-corner.tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
.card-corner.bl { bottom: 6px; left: 6px; border-right: none; border-top: none; }
.card-corner.br { bottom: 6px; right: 6px; border-left: none; border-top: none; }

.card-name {

.card-spec {
  font-style: italic; font-size: 13px; color: #5C3D2E;

.card-foot {

.card-paid { display: flex; align-items: baseline; gap: 8px; }
.card-paid-label {

.card-paid-val {

.card-note {

.calling-card.alert .card-note { color: #8B2020; font-weight: 600; font-style: normal; }

/* ── COLOPHON ───────────────────────────────────────── */
.colophon {
  margin-top: 60px;
  text-align: center;
  padding: 24px 20px;
  border-top: 2px double #8B7355;
  border-bottom: 2px double #8B7355;
}
.colophon p {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 14px;
  color: #5C3D2E;
  max-width: 640px; margin: 14px auto 8px;
  line-height: 1.6;
}
.colophon-meta {
  font-family: 'IM Fell English SC', serif;
  font-size: 11px; letter-spacing: 4px; color: #8B7355;
}
.colophon > svg { margin: 0 auto; }

/* ── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 880px) {
  #root { padding: 24px 16px 60px; }
  .ledger-totals { grid-template-columns: 1fr; gap: 14px; }
  .ledger-divider { width: 60%; height: 1px; margin: 0 auto; }
  .board-notes { grid-template-columns: 1fr; gap: 36px; }
  .cat-row { grid-template-columns: 1fr; gap: 4px; }
  .cat-fig { text-align: left; }
  .project-grid { grid-template-columns: 1fr; }
  .masthead-top { flex-direction: column; align-items: flex-start; }
  .masthead-right { align-self: stretch; justify-content: space-between; }
}

/* ── PRINT ──────────────────────────────────────────── */
@media print {
  body { background: white; }
  body::before { display: none; }

  .print-seal, .rolodex-toggle, .notes-toggle, .filter-bar,

  .board-surface { background: #F5F0E8; box-shadow: none; border: 1px solid #999; }
  .pinned-note { box-shadow: none; transform: none !important; }
  .colophon { page-break-before: avoid; }
  .alert-notice { box-shadow: none; background: #fff; border: 2px solid #8B2020; }
  .notes-body { display: block !important; }
  @page { margin: 16mm; }
}

const fmtMoney = (n) =>

      <line x1="120" y1="13" x2="200" y2="13" stroke="#8B7355" strokeWidth="0.5" />

}

function StatusBadge({ status }) {
  const map = {
    "IN PROGRESS":   { color: "#C4623A", border: "#8B3A1F", rot: 1,  bg: "rgba(196,98,58,0.08)" },
    "COMPLETED":     { color: "#2D4A2D", border: "#1F3320", rot: -2, bg: "rgba(45,74,45,0.08)" },
    "PLANNED":       { color: "#4A6274", border: "#2F4250", rot: 0,  bg: "transparent" },
    "ON HOLD":       { color: "#8B2020", border: "#5A1212", rot: -2, bg: "transparent" },
    "ACTION NEEDED": { color: "#A36A00", border: "#7A4A00", rot: 1,  bg: "rgba(212,168,83,0.18)" }
  };
  const s = map[status] || map.PLANNED;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      fontFamily: "'Playfair Display', serif", fontWeight: 700,
      fontSize: 10.5, letterSpacing: "2px", color: s.color,
      border: `1.8px ${status === "PLANNED" ? "dashed" : "solid"} ${s.border}`,
      padding: "4px 10px", background: s.bg,
      textTransform: "uppercase", transform: `rotate(${s.rot}deg)`,
      borderRadius: 2,
      boxShadow: status === "COMPLETED" ? "inset 0 0 0 2px #2D4A2D, 0 0 0 1px #F5F0E8" : "none"
    }}>
      {status === "COMPLETED" && <span style={{ fontSize: 11 }}>&#10003;</span>}
      {status === "ACTION NEEDED" && <span style={{ fontSize: 11 }}>!</span>}
      {status}
    </span>
  );
}

function TapeBar({ value, max, alert }) {
  const pct = max > 0 ? Math.min(100, (value / max) * 100) : 0;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{
        position: "relative", flex: 1, height: 10,
        background: "#E0CFA9", border: "1px solid #8B7355",
        borderRadius: 0, overflow: "hidden"
      }}>
        <div style={{
          width: `${pct}%`, height: "100%",
          background: alert
            ? "repeating-linear-gradient(45deg,#8B2020 0 4px,#A33030 4px 8px)"
            : "linear-gradient(180deg,#C4623A,#A14A2A)",
          transition: "width 0.4s ease"
        }} />
        {Array.from({ length: 20 }).map((_, i) => (
          <div key={i} style={{
            position: "absolute", left: `${i * 5}%`, top: 0, width: 1,
            height: i % 4 === 0 ? 10 : 5, background: "rgba(92,61,46,0.35)"
          }} />
        ))}
      </div>
      <span style={{ fontFamily: "Inter, sans-serif", fontSize: 11, color: "#5C3D2E", minWidth: 36, textAlign: "right" }}>
        {Math.round(pct)}%
      </span>
    </div>
  );
}

  const onHold = p.status === "ON HOLD";

        <div>

            <div className="polaroid-caption">&mdash; {p.name.toLowerCase()} &mdash;</div>
          </div>
        </div>
      )}
    </div>
  );
}

          <h2 className="section-title">The Facade</h2>
          <span className="section-sub">&mdash; Click a zone to filter projects &mdash;</span>
        </div>
        <div className="house-frame">
          <window.HouseElevation
            activeZone={zone}
            onZoneClick={(z) => setZone(zone === z ? null : z)}
          />
        </div>
        <div className="zone-tiles">
          {window.ZONES.filter(z => z.on === "tile").map(z => (
            <button key={z.id} className={`zone-tile ${zone === z.id ? "active" : ""}`}
              onClick={() => setZone(zone === z.id ? null : z.id)}>
              <span className="tile-mark" />
              <span className="tile-label">{z.label}</span>
            </button>
          ))}
          <button className={`zone-tile clear ${!zone ? "active" : ""}`} onClick={() => setZone(null)}>
            <span className="tile-mark" />
            <span className="tile-label">All Zones</span>
          </button>
        </div>
        <div className="filter-readout">
          Showing: <i>{activeZoneLabel}</i> projects
        </div>
      </section>

      {/* FILTER + SORT BAR */}
      <section className="filter-bar">
        <div className="filter-row">
          <span className="filter-label">Status</span>
          <div className="filter-tabs">
            {STATUSES.map(s => (
              <button key={s} className={`stamp-tab ${status === s ? "active" : ""}`} onClick={() => setStatus(s)}>{s}</button>
            ))}
          </div>
        </div>
        <div className="filter-row">
          <span className="filter-label">Sort</span>
          <div className="filter-tabs sort-tabs">
            {SORTS.map(s => (
              <button key={s} className={`stamp-tab small ${sort === s ? "active" : ""}`} onClick={() => setSort(s)}>{s}</button>
            ))}
          </div>
        </div>
      </section>

      {/* PROJECT GRID */}
      <section className="projects">
        {sort === "Phase" ? (
          PHASES.map(ph => {
            const list = grouped[ph.id] || [];
            if (list.length === 0) return null;
            return (
              <div key={ph.id} className="phase-group">
                <PhaseDivider phase={ph} count={list.length} />
                <div className="project-grid">
                  {list.map(p => (
                    <ProjectCard key={p.id} p={p} expanded={!!expanded[p.id]}
                      onToggle={() => setExpanded(e => ({ ...e, [p.id]: !e[p.id] }))} />
                  ))}
                </div>
              </div>
            );
          })
        ) : (
          <div className="project-grid">
            {filtered.map(p => (
              <ProjectCard key={p.id} p={p} expanded={!!expanded[p.id]}
                onToggle={() => setExpanded(e => ({ ...e, [p.id]: !e[p.id] }))} />
            ))}
          </div>
        )}
        {filtered.length === 0 && (
          <div className="empty-state">
            <Ornament width={120} />
            <p>No projects match this view.</p>
            <button onClick={() => { setZone(null); setStatus("All"); }}>Clear filters</button>
          </div>
        )}
      </section>

      {/* CONTRACTOR ROLODEX */}
      <section className="rolodex-section">
        <button className="rolodex-toggle" onClick={() => setRolodexOpen(o => !o)}>
          <span>Open Contractor Files</span>
          <span className="caret">{rolodexOpen ? "▴" : "▾"}</span>
        </button>
        {rolodexOpen && (
          <div className="rolodex">
            {contractors.map(c => (
              <div key={c.name} className={`calling-card ${c.alert ? "alert" : ""}`}>
                <div className="card-corner tl" /><div className="card-corner tr" />
                <div className="card-corner bl" /><div className="card-corner br" />
                <div className="card-eyebrow">&mdash; Calling Card &mdash;</div>
                <div className="card-name">{c.name}</div>
                <div className="card-spec">{c.specialty}</div>
                <Ornament width={100} />
                <div className="card-foot">
                  <div className="card-paid">
                    <span className="card-paid-label">paid to date</span>
                    <span className="card-paid-val num">{fmtMoney(c.paid)}</span>
                  </div>
                  <div className="card-note">{c.note}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      {/* COLOPHON */}
      <footer className="colophon">
        <Ornament width={260} />
        <p>
          Compiled with care for the residents of 3685 Pershing Avenue &middot;
          A Spanish Revival bungalow in the North Park district of San Diego, California &middot;
          One hundred and two years young.
        </p>
        <div className="colophon-meta">
          <span>3 BED &middot; 2 BATH &middot; 1,190 SQ FT &middot; 7,501 SQ FT LOT</span>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
  </script>
</body>
</html>
